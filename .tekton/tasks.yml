apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: project-tasks
spec:
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        echo "Cleaning up workspace..."
        rm -rf *
        rm -rf .[^.]*

    - name: nose
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        pip install -r requirements.txt
        nosetests -v --with-spec --spec-color
